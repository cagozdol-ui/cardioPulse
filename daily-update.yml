name: CardioPulse Günlük Güncelleme

on:
  schedule:
    # 05:00 UTC = 08:00 Türkiye saati (TRT, UTC+3)
    - cron: "0 5 * * *"
  workflow_dispatch: {}  # manuel tetiklemek için (Actions sekmesinden "Run workflow")

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: PubMed'den çek ve skorla
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python fetch_and_score.py

      - name: HTML sayfasını üret
        run: python generate_html.py

      - name: Değişiklikleri commit'le
        run: |
          git config user.name "cardiopulse-bot"
          git config user.email "actions@github.com"
          git add data/latest.json docs/index.html
          git diff --staged --quiet || git commit -m "Günlük güncelleme: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
